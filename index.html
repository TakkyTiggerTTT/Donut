<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="My personal website"
    >

    <title>My Website</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            color: #ffffff;
            background:
                radial-gradient(circle at top, #263b73, transparent 45%),
                #090d1a;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: auto;
            padding: 24px;
        }

        .logo {
            font-size: 1.4rem;
            font-weight: 700;
        }

        nav a {
            margin-left: 24px;
            color: #dbe4ff;
            text-decoration: none;
        }

        nav a:hover {
            color: #ffffff;
        }

        main {
            display: grid;
            place-items: center;
            min-height: calc(100vh - 90px);
            padding: 40px 24px;
            text-align: center;
        }

        .hero {
            max-width: 750px;
        }

        .badge {
            display: inline-block;
            margin-bottom: 20px;
            padding: 8px 14px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 999px;
            color: #b9c8ff;
            background: rgba(255, 255, 255, 0.06);
        }

        h1 {
            margin-bottom: 18px;
            font-size: clamp(3rem, 10vw, 6rem);
            line-height: 1;
        }

        p {
            margin: auto;
            max-width: 600px;
            color: #b8c1d9;
            font-size: 1.15rem;
            line-height: 1.7;
        }

        .buttons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-top: 32px;
        }

        button,
        .button {
            display: inline-block;
            padding: 14px 24px;
            border: 0;
            border-radius: 10px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }

        .primary {
            color: #081023;
            background: #ffffff;
        }

        .secondary {
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.08);
        }

        #message {
            min-height: 24px;
            margin-top: 24px;
            color: #8fffc2;
        }

        footer {
            padding: 25px;
            color: #7f89a3;
            text-align: center;
        }

        @media (max-width: 600px) {
            nav div:last-child {
                display: none;
            }
        }
    </style>
</head>

<body>
    <nav>
        <div class="logo">MyWebsite</div>

        <div>
            <a href="#home">Home</a>
            <a href="#about">About</a>
        </div>
    </nav>

    <main id="home">
        <section class="hero">
            <div class="badge">Website under development</div>

            <h1>Welcome.</h1>

            <p id="about">
                This is my new website. More content and features
                will be added soon.
            </p>

            <div class="buttons">
                <button class="primary" id="helloButton">
                    Test JavaScript
                </button>

                <a
                    class="button secondary"
                    href="https://github.com"
                    target="_blank"
                    rel="noopener noreferrer"
                >
                    GitHub
                </a>
            </div>

            <div id="message"></div>
        </section>
    </main>

    <footer>
        <span id="year"></span> MyWebsite
    </footer>

    <script>
        const helloButton = document.getElementById("helloButton");
        const message = document.getElementById("message");
        const year = document.getElementById("year");

        year.textContent = `© ${new Date().getFullYear()}`;

        helloButton.addEventListener("click", () => {
            message.textContent = "The website is working!";
        });
    </script>
</body>
</html>
